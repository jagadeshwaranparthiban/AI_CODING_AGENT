services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: codeagent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: code-agent
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
    volumes:
      - .:/app
      - ./workspaces:/app/workspaces
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  postgres_data: